<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Project Phoenix — Console</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a1a; color: #cce; font-family: monospace; }
    body { padding: 1rem; box-sizing: border-box; }
    h2 { margin: 0 0 1rem; color: #8af; }
    label { display: block; margin-bottom: 1rem; }
    input[type="text"] { display: block; width: 100%; box-sizing: border-box;
      background: #111; color: #eef; border: 1px solid #446; padding: 0.5rem; margin-top: 0.25rem; }
    button { display: block; width: 100%; background: #224; color: #eef;
      border: 1px solid #446; padding: 0.75rem; margin: 0.4rem 0; cursor: pointer;
      font-family: monospace; font-size: 1rem; text-align: left; }
    button:active { background: #336; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.mine { border-color: #8af; color: #8af; }
    button.alert-on { background: #600; border-color: #f44; color: #faa; }
    #player-list { margin-top: 1rem; font-size: 0.85rem; color: #99b; }
    #player-list div { padding: 0.2rem 0; }
    #status { margin-top: 1.5rem; color: #778; font-size: 0.8rem; }
    section { display: none; }
    section.active { display: block; }
  </style>
</head>
<body>
  <h2 id="phase-title">Lobby</h2>

  <section id="lobby-ui">
    <label>Name
      <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
    </label>
    <div id="console-list"></div>
    <button id="engage-btn">Engage</button>
    <div id="player-list"></div>
  </section>

  <section id="game-ui">
    <button id="red-alert-btn">Red Alert: OFF</button>
    <p id="game-status"></p>
  </section>

  <div id="status">Connecting…</div>

  <script>
    // ── Persistence ──────────────────────────────────────────────────────────

    const RANKS = ['Ensign', 'Lieutenant', 'Commander', 'Captain', 'Admiral'];
    const STARS = ['Vega', 'Altair', 'Rigel', 'Deneb', 'Sirius', 'Nova', 'Quasar', 'Nebula', 'Pulsar', 'Proxima'];

    function randomName() {
      return RANKS[Math.floor(Math.random() * RANKS.length)] + ' ' +
             STARS[Math.floor(Math.random() * STARS.length)];
    }

    let myToken = localStorage.getItem('session-token');
    if (!myToken) {
      myToken = Array.from(crypto.getRandomValues(new Uint8Array(16)))
        .map(b => b.toString(16).padStart(2, '0')).join('');
      localStorage.setItem('session-token', myToken);
    }

    let myName = localStorage.getItem('player-name') || randomName();
    localStorage.setItem('player-name', myName);

    // ── State ────────────────────────────────────────────────────────────────

    let players = [];   // Vec<Player> from server
    let phase = 'Lobby';
    let redAlert = false;
    let conn = null;

    // ── Helpers ──────────────────────────────────────────────────────────────

    const $ = id => document.getElementById(id);

    function me() { return players.find(p => p.token === myToken); }
    function isCaptain() { return players.length > 0 && players[0].token === myToken; }

    function send(type, data) {
      if (!conn || !conn.open) return;
      const msg = data !== undefined ? { type, data } : { type };
      conn.send(JSON.stringify(msg));
    }

    function setStatus(text) { $('status').textContent = text; }

    // ── Rendering ────────────────────────────────────────────────────────────

    function render() {
      const inGame = phase === 'InProgress';
      $('phase-title').textContent = inGame ? 'In Progress' : 'Lobby';
      $('lobby-ui').className = inGame ? '' : 'active';
      $('game-ui').className  = inGame ? 'active' : '';
      if (inGame) renderGame(); else renderLobby();
    }

    function renderLobby() {
      // Console picker — only CaptainChair exists for now
      const CONSOLES = ['CaptainChair'];
      const list = $('console-list');
      list.innerHTML = '';
      for (const c of CONSOLES) {
        const holder = players.find(p => p.console === c);
        const btn = document.createElement('button');
        if (holder && holder.token === myToken) {
          btn.textContent = c + ': Mine — clear';
          btn.className = 'mine';
          btn.onclick = () => send('ClearConsole');
        } else if (holder) {
          btn.textContent = c + ': ' + holder.name;
          btn.disabled = true;
        } else {
          btn.textContent = c + ': available';
          btn.onclick = () => send('SelectConsole', { console: c });
        }
        list.appendChild(btn);
      }

      // Engage button only visible to captain while in lobby
      $('engage-btn').style.display = isCaptain() ? 'block' : 'none';

      // Player list
      const pl = $('player-list');
      pl.innerHTML = '';
      players.forEach((p, i) => {
        const div = document.createElement('div');
        const mark = p.token === myToken ? '▶ ' : '• ';
        const cap  = i === 0 ? ' (captain)' : '';
        const con  = p.console ? ' [' + p.console + ']' : '';
        div.textContent = mark + p.name + cap + con;
        pl.appendChild(div);
      });
    }

    function renderGame() {
      const cap = isCaptain();
      const btn = $('red-alert-btn');
      btn.style.display = cap ? 'block' : 'none';
      btn.textContent = 'Red Alert: ' + (redAlert ? 'ON' : 'OFF');
      btn.className = redAlert ? 'alert-on' : '';
      $('game-status').textContent = cap
        ? 'You are the captain. Issue orders.'
        : 'Stand by for orders.';
    }

    // ── Event wiring ─────────────────────────────────────────────────────────

    $('name-input').value = myName;

    let nameTimer = null;
    $('name-input').addEventListener('input', e => {
      const val = e.target.value.trim();
      if (!val) return;
      myName = val;
      clearTimeout(nameTimer);
      nameTimer = setTimeout(() => {
        localStorage.setItem('player-name', myName);
        send('SetName', { name: myName });
      }, 500);
    });

    $('engage-btn').addEventListener('click', () => send('StartGame'));

    $('red-alert-btn').addEventListener('click', () => send('ToggleRedAlert'));

    // ── Incoming message handler ──────────────────────────────────────────────

    function handleMessage(msg) {
      switch (msg.type) {
        case 'Welcome':
          phase   = msg.data.state.phase;
          players = msg.data.state.players;
          setStatus('Connected');
          break;
        case 'PlayerJoined':
          if (!players.find(p => p.token === msg.data.player.token))
            players.push(msg.data.player);
          break;
        case 'PlayerLeft':
          players = players.filter(p => p.token !== msg.data.token);
          break;
        case 'ConsoleSelected': {
          const p = players.find(p => p.token === msg.data.token);
          if (p) p.console = msg.data.console;
          break;
        }
        case 'ConsoleCleared': {
          const p = players.find(p => p.token === msg.data.token);
          if (p) p.console = null;
          break;
        }
        case 'NameChanged': {
          const p = players.find(p => p.token === msg.data.token);
          if (p) p.name = msg.data.name;
          if (msg.data.token === myToken) myName = msg.data.name;
          break;
        }
        case 'GameStarted':
          phase = 'InProgress';
          break;
        case 'SimState':
          redAlert = msg.data.snapshot.red_alert;
          break;
        default:
          return; // unknown — skip re-render
      }
      render();
    }

    // ── PeerJS connection ─────────────────────────────────────────────────────

    const hostPeerId = location.hash.slice(1);

    if (!hostPeerId) {
      setStatus('No host ID in URL. Scan the QR code on the view screen.');
    } else {
      const clientPeer = new Peer();

      clientPeer.on('open', () => {
        setStatus('Connecting to host…');
        conn = clientPeer.connect(hostPeerId, { reliable: true });

        conn.on('open', () => {
          send('Identify', { token: myToken, name: myName });
          setStatus('Waiting for server…');
        });

        conn.on('data', raw => {
          try {
            const str = typeof raw === 'string' ? raw : new TextDecoder().decode(raw);
            handleMessage(JSON.parse(str));
          } catch (e) { console.error('[client] bad message', e, raw); }
        });

        conn.on('close', () => { setStatus('Disconnected'); conn = null; });
        conn.on('error', e  => setStatus('Connection error: ' + e.type));
      });

      clientPeer.on('error', e => setStatus('Peer error: ' + e.type));
    }
  </script>
</body>
</html>
