<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Phoenix — View Screen</title>

  <!-- CDN deps loaded before our script so they're in scope synchronously -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #overlay { position: absolute; top: 1rem; right: 1rem; z-index: 10; }
    #qr { display: none; }
  </style>
</head>
<body>
  <!-- Bevy renders into the canvas that DefaultPlugins creates at startup -->
  <canvas id="canvas"></canvas>

  <!-- QR code shown over the canvas during lobby phase -->
  <div id="overlay">
    <a id="qr-link" target="_blank" style="cursor:pointer">
      <canvas id="qr"></canvas>
    </a>
  </div>

  <!-- Trunk replaces this tag with the compiled WASM bundle (no-modules target).
       After it runs, wasm_init / wasm_receive_message / set_message_callback are
       available either directly in scope or under the wasm_bindgen.* namespace. -->
  <link data-trunk rel="rust" data-wasm-opt="z" data-bindgen-target="no-modules" />

  <script>
    // ── PeerJS host peer ───────────────────────────────────────────────────

    // peer connection id → session token (resolved once Identify arrives)
    const peerTokens = new Map();
    // session token → DataConnection (for routing server→client messages)
    const tokenConns = new Map();
    // messages queued before WASM is ready
    const msgQueue = [];

    const hostPeerId = Array.from(crypto.getRandomValues(new Uint8Array(16)))
      .map(b => b.toString(16).padStart(2, '0')).join('');
    const joinUrl = location.href.replace(/server\.html.*$/, 'client.html') + '#' + hostPeerId;

    const peer = new Peer(hostPeerId);

    peer.on('open', () => {
      const canvas = document.getElementById('qr');
      canvas.style.display = 'block';
      QRCode.toCanvas(canvas, joinUrl, { width: 200 });
      document.getElementById('qr-link').href = joinUrl;
    });

    peer.on('connection', (conn) => {
      conn.on('data', (raw) => {
        const json = typeof raw === 'string' ? raw : JSON.stringify(raw);
        let token = peerTokens.get(conn.peer);

        // First message from this peer must be Identify — extract the token
        if (!token) {
          try {
            const msg = JSON.parse(json);
            if (msg.type === 'Identify') {
              token = msg.data.token;
              peerTokens.set(conn.peer, token);
              tokenConns.set(token, conn);
            }
          } catch (_) { return; }
        }

        if (token) dispatchToWasm(token, json);
      });

      conn.on('close', () => {
        const token = peerTokens.get(conn.peer);
        if (!token) return;
        // Notify the simulation that this player disconnected
        dispatchToWasm(token, JSON.stringify({ type: 'ClearConsole', data: null }));
        peerTokens.delete(conn.peer);
        tokenConns.delete(token);
      });

      conn.on('error', (err) => console.error('[PeerJS conn]', err));
    });

    peer.on('error', (err) => console.error('[PeerJS host]', err));

    // ── WASM dispatch ─────────────────────────────────────────────────────

    function dispatchToWasm(token, json) {
      if (typeof wasm_receive_message === 'function') {
        wasm_receive_message(token, json);
      } else {
        msgQueue.push([token, json]);
      }
    }

    // ── Outbound routing ───────────────────────────────────────────────────

    function routeOutbound(target, payload) {
      if (target === 'all') {
        for (const conn of tokenConns.values()) conn.send(payload);
      } else if (target.startsWith('token:')) {
        tokenConns.get(target.slice(6))?.send(payload);
      } else if (target.startsWith('except:')) {
        const exc = target.slice(7);
        for (const [t, conn] of tokenConns.entries()) {
          if (t !== exc) conn.send(payload);
        }
      }
    }

    // ── WASM startup ───────────────────────────────────────────────────────
    // Trunk (no-modules target) sets window.wasm_bindgen once the generated
    // JS loads, but wasm_bindgen.wasm_init isn't callable until the binary
    // is fully instantiated. wasm_bindgen.__wbindgen_wasm_module is set by
    // wasm-bindgen only after instantiation completes, so we wait for that.

    function startPhoenix() {
      window.wasm_init            = wasm_bindgen.wasm_init;
      window.wasm_receive_message = wasm_bindgen.wasm_receive_message;
      window.set_message_callback = wasm_bindgen.set_message_callback;
      set_message_callback(routeOutbound);
      wasm_init();
      for (const [token, json] of msgQueue.splice(0)) wasm_receive_message(token, json);
    }

    function tryStart() {
      if (typeof wasm_bindgen === 'undefined' || !wasm_bindgen.__wbindgen_wasm_module) {
        requestAnimationFrame(tryStart);
        return;
      }
      startPhoenix();
    }

    requestAnimationFrame(tryStart);
  </script>
</body>
</html>
