<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Project Phoenix — Console</title>
  <style>
    body { margin: 0; background: #0a0a1a; color: #cce; font-family: monospace; padding: 1rem; }
    input { background: #111; color: #eef; border: 1px solid #446; padding: 0.5rem; width: 100%; box-sizing: border-box; }
    button { background: #224; color: #eef; border: 1px solid #446; padding: 0.75rem 1.5rem; margin: 0.5rem 0; cursor: pointer; width: 100%; }
    button:active { background: #335; }
    #status { color: #aaa; font-size: 0.85rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h2 id="phase-title">Lobby</h2>

  <section id="lobby-ui">
    <label>Name
      <input id="name-input" type="text" placeholder="Your name" />
    </label>
    <div id="console-list"></div>
    <button id="engage-btn" style="display:none">Engage</button>
    <button id="join-btn" style="display:none">Join In Progress</button>
  </section>

  <section id="console-ui" style="display:none">
    <button id="red-alert-btn">Red Alert: OFF</button>
  </section>

  <div id="status">Connecting…</div>

  <script>
    // Placeholder — wired up in issue 010
    const token = localStorage.getItem('session-token') || crypto.randomUUID();
    localStorage.setItem('session-token', token);
  </script>
</body>
</html>
